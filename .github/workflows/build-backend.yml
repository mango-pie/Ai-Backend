name: Build Backend

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.cursor/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build JAR
        run: mvn -B clean package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-backend-jar
          path: target/AI-*.jar
          retention-days: 30
