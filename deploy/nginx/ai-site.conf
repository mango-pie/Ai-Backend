# Nginx 站点配置 — IP 访问模式
# 1. 替换 SERVER_IP 为公网 IP（或改为 _ 监听所有）
# 2. 复制到 /etc/nginx/sites-available/ai-site.conf
# 3. ln -s /etc/nginx/sites-available/ai-site.conf /etc/nginx/sites-enabled/
# 4. 删除 default：rm /etc/nginx/sites-enabled/default
# 5. nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name SERVER_IP;

    client_max_body_size 20m;

    # ---- 前端 Vue SPA ----
    root /var/www/ai-frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- 后端 API（含 SSE 流式）----
    location /api/ {
        proxy_pass http://127.0.0.1:8123/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
    }

    # ---- AI 实验室部署的小站点（6 位 deployKey，如 /aBc12x/）----
    # 物理路径：/opt/ai-backend/tmp/code_deploy/{deployKey}/index.html
    location ~ ^/[A-Za-z0-9]{6} {
        root /opt/ai-backend/tmp/code_deploy;
        index index.html;
        try_files $uri $uri/ =404;
    }
}
