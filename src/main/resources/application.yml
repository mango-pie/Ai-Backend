spring:
  config:
    import: optional:classpath:application-local.yml,optional:file:./application-local.yml
  application:
    name: scene-ai-code-backend
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/aiscene?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6381}
      password: ${REDIS_PASSWORD:}
      ttl: 86400
  session:
    store-type: none
    timeout: 24h

server:
  port: ${SERVER_PORT:8123}
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    session:
      timeout: 24h
      cookie:
        max-age: 24h

springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.ai.controller
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

knife4j:
  enable: true
  setting:
    language: zh_cn

langchain4j:
  open-ai:
    streaming-chat-model:
      base-url: ${CODEGEN_API_BASE_URL:http://127.0.0.1:14514/v1}
      api-key: ${CODEGEN_API_KEY:}
      model-name: ${CODEGEN_MODEL_NAME:deepseek-v4-flash}
      max-tokens: 8192
      log-requests: true
      log-responses: true
    chat-model:
      base-url: ${DASHSCOPE_API_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      api-key: ${DASHSCOPE_API_KEY:}
      model-name: qwen-flash
      max-tokens: 256
      temperature: 0.1
      timeout: 5s
    agent-chat-model:
      base-url: ${DASHSCOPE_API_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      api-key: ${DASHSCOPE_API_KEY:}
      model-name: qwen-plus
      max-tokens: 4096
      temperature: 0.3
      timeout-seconds: 60

chat:
  agent:
    enabled: true
    max-steps: 8
    history-limit: 20
    l2-enabled: false
  attachment-cache-ttl-minutes: 120
  image-caption:
    enabled: true
    base-url: ${DASHSCOPE_API_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    api-key: ${CHAT_IMAGE_CAPTION_API_KEY:}
    model-name: qwen3.6-flash
    prompt: "请用中文详细描述这张图片：包括画面主体、场景、颜色、文字内容（如有）、人物动作与情绪。只输出描述，不要提问。"
    timeout-seconds: 30
  segmentation:
    enabled: true
    style: natural
    min-length: 15
    max-segments: 8
    temperature: 0.1
    max-tokens: 256
    timeout-seconds: 5
    delay-base: 0.35
    delay-per-char: 0.015
    delay-max: 1.2
    fallback-to-rules: true

upload:
  path: ${UPLOAD_PATH:./tmp/uploads/}
  access-path: /uploads/**
  base-url: ${UPLOAD_BASE_URL:http://localhost:8123/api}
  max-file-size: 20

gpt-sovits:
  base-url: ${GPT_SOVITS_BASE_URL:http://127.0.0.1:9880}
  connect-timeout-ms: 5000
  read-timeout-ms: 120000
  ref-audio:
    upload-dir: ${GPT_SOVITS_REF_DIR:./tmp/tts-ref/}
    max-size-mb: 10
    allowed-ext: wav,mp3
  seed-voice:
    enabled: ${GPT_SOVITS_SEED_ENABLED:false}
    name: 达妮娅
    ref-audio-path: ${GPT_SOVITS_SEED_REF_PATH:}
    prompt-text: ${GPT_SOVITS_SEED_PROMPT:}
    prompt-lang: zh
    text-lang: zh

astrbot:
  base-url: ${ASTRBOT_BASE_URL:http://127.0.0.1:6185}
  api-key: ${ASTRBOT_API_KEY:}
  connect-timeout-ms: 5000
  read-timeout-ms: 300000

app:
  redis:
    mode: auto
    ping-timeout-ms: 2000
  deploy:
    host: ${APP_DEPLOY_HOST:http://localhost}
    code-output-dir: ${APP_CODE_OUTPUT_DIR:}
    code-deploy-dir: ${APP_CODE_DEPLOY_DIR:}
