spring:
  application:
    name: scene-ai-code-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/aiscene
    username: root
    password: root
  # redis
  data:
    redis:
      host: localhost
      port: 6381
      password:
      ttl: 3600
  session:
    store-type: redis
    timeout: 3600
  # 会话过期时间（秒）
server:
  port: 8123
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 3600
  # 会话过期时间（秒）

# springdoc 配置（顶层）
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.ai.controller
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# knife4j 配置（顶层）
knife4j:
  enable: true
  setting:
    language: zh_cn

# AI 配置
langchain4j:
  open-ai:
    streaming-chat-model:
      base-url: https://api.deepseek.com
      api-key: your key
      model-name: deepseek-chat
      max-tokens: 8192
      log-requests: true
      log-responses: true



